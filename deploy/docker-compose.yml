services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lessondeck}
      MYSQL_USER: ${MYSQL_USER:-lessondeck}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports: ["${MYSQL_HOST_PORT:-3306}:3306"]
    volumes: ["mysql_data:/var/lib/mysql"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-root_change_me}"]
      interval: 5s
      timeout: 5s
      retries: 20
  backend:
    build: ../backend
    env_file:
      - path: ../.env
        required: false
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      CHROMA_PERSIST_DIR: /app/data/chroma
      UPLOAD_DIR: /app/data/uploads
      EXPORT_DIR: /app/data/exports
      AI_FORCE_FALLBACK: ${AI_FORCE_FALLBACK:-false}
    ports: ["8000:8000"]
    volumes: ["app_data:/app/data"]
    depends_on:
      mysql: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports: ["5173:80"]
    depends_on:
      backend: {condition: service_healthy}
volumes:
  mysql_data:
  app_data:
